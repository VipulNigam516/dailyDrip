<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Drip — Compile Results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --red:#BB1E10;
    --red-dark:#8F170C;
    --white:#FFFFFF;
    --off-white:#FFF6F5;
    --ink:#2A1210;
    --ink-dim:#8A6B67;
    --line: rgba(187,30,16,0.14);
    --line-bright: rgba(187,30,16,0.28);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--white);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2{font-family:'Fraunces', serif;}
  .wrap{max-width:640px;margin:0 auto;padding:0 0 60px;}
  .topbar{display:flex;align-items:center;justify-content:center;padding:18px 20px;background:var(--red);}
  .brand{font-family:'Fraunces',serif;font-size:16px;letter-spacing:0.06em;color:var(--white);text-transform:uppercase;font-weight:600;}
  .content-pad{padding:28px 20px 0;}

  textarea{
    width:100%;background:var(--off-white);border:1px solid var(--line);border-radius:12px;
    color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:14px 16px;
    resize:vertical;min-height:160px;
  }
  textarea:focus{outline:none;border-color:var(--red);}

  .btn-primary{
    display:inline-flex;align-items:center;gap:8px;justify-content:center;width:100%;
    background:var(--red);color:var(--white);border:none;
    font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:15px;
    padding:14px 30px;border-radius:100px;cursor:pointer;margin-top:14px;
  }
  .btn-primary:hover{background:var(--red-dark);}

  .note{color:var(--ink-dim);font-size:13.5px;margin-bottom:14px;line-height:1.5;}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:24px 0;}
  .stat-box{background:var(--off-white);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .stat-num{font-family:'Fraunces',serif;font-size:28px;color:var(--red);font-weight:600;line-height:1;}
  .stat-label{font-size:11.5px;color:var(--ink-dim);margin-top:6px;letter-spacing:0.02em;}

  .bar-row{display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:7px;}
  .bar-label{width:150px;flex-shrink:0;color:var(--ink-dim);font-size:12.5px;}
  .bar-track{flex:1;height:8px;background:var(--off-white);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--red);border-radius:6px;}
  .bar-count{width:26px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-dim);}

  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--red-dark);margin:28px 0 12px;font-family:'IBM Plex Mono',monospace;}
  .resp-item{background:var(--off-white);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px;font-size:13px;color:var(--ink-dim);}
  .resp-item b{color:var(--ink);}
  .empty-state{text-align:center;padding:50px 20px;color:var(--ink-dim);font-size:14px;}
  .export-row{display:flex;gap:10px;margin-top:24px;}
  .export-row button{flex:1;}
  .btn-secondary{
    background:transparent;border:1px solid var(--line-bright);color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;font-weight:500;font-size:14px;
    padding:11px 22px;border-radius:100px;cursor:pointer;
  }
</style>
</head>
<body>
<div class="topbar"><div class="brand">Daily Drip — Compile Results</div></div>
<div class="wrap"><div class="content-pad" id="app"></div></div>

<script>
function decodeAnswers(code){
  return JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
}

function render(){
  document.getElementById('app').innerHTML = `
    <p class="note">Paste in every code you've received back over WhatsApp — one per line (blank lines between them are fine too).</p>
    <textarea id="pasteBox" placeholder="Paste codes here, one per line..."></textarea>
    <button class="btn-primary" onclick="compileResults()">Compile results</button>
    <div id="results-body" style="margin-top:10px;"></div>
  `;
}

function avg(arr){ const nums = arr.filter(x=>typeof x==='number'); if(!nums.length) return null; return (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1); }
function countBy(arr, key){
  const counts = {};
  arr.forEach(r => { const v = r[key]; if(v!==undefined && v!=='') counts[v] = (counts[v]||0)+1; });
  return counts;
}
function barChart(counts, total){
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  return entries.map(([label,count])=>`
    <div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(count/total*100).toFixed(0)}%"></div></div>
      <div class="bar-count">${count}</div>
    </div>`).join('');
}

function compileResults(){
  const raw = document.getElementById('pasteBox').value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>10);
  const all = [];
  let failed = 0;
  lines.forEach(line => {
    try{ all.push(decodeAnswers(line)); } catch(e){ failed++; }
  });
  const body = document.getElementById('results-body');
  if(all.length === 0){
    body.innerHTML = `<div class="empty-state">Couldn't read any valid codes. Check they were pasted in full, with nothing cut off.</div>`;
    window._allResponses = [];
    return;
  }
  let warn = failed > 0 ? `<div style="color:var(--red);font-size:12.5px;margin-bottom:16px;">${failed} line(s) couldn't be read and were skipped.</div>` : '';
  body.innerHTML = warn + renderStats(all) + renderRawList(all);
  window._allResponses = all;
}

const EASE_SCORE = {"Very easy":5,"Easy":4,"Moderate":3,"Difficult":2,"Very difficult":1};
const TASTE_SCORE = {"Poor":1,"Average":2,"Good":3,"Great":4};

function renderStats(all){
  const n = all.length;
  const easeAvg = avg(all.map(r=>EASE_SCORE[r.ease]));
  const tasteAvg = avg(all.map(r=>TASTE_SCORE[r.taste_like]));
  const wtpAvg = avg(all.map(r=>parseFloat(r.wtp_amount)).filter(x=>!isNaN(x)));
  const wouldAgain = all.filter(r=>r.drink_again==='Yes, definitely').length;

  return `
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${n}</div><div class="stat-label">Total responses</div></div>
      <div class="stat-box"><div class="stat-num">${easeAvg ?? '—'}</div><div class="stat-label">Avg ease (1=very difficult, 5=very easy)</div></div>
      <div class="stat-box"><div class="stat-num">${tasteAvg ?? '—'}</div><div class="stat-label">Avg taste (1=poor, 4=great)</div></div>
      <div class="stat-box"><div class="stat-num">${wtpAvg ? '₹'+wtpAvg : '—'}</div><div class="stat-label">Avg willingness to pay</div></div>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${n?Math.round(wouldAgain/n*100):0}%</div><div class="stat-label">Would use again</div></div>
    </div>

    <div class="section-title">How they usually drink coffee</div>
    ${barChart(countBy(all,'coffee_how'), n)}

    <div class="section-title">How often they drink coffee</div>
    ${barChart(countBy(all,'coffee_freq'), n)}

    <div class="section-title">Ice availability</div>
    ${barChart(countBy(all,'ice_ready'), n)}

    <div class="section-title">Did it feel time-consuming?</div>
    ${barChart(countBy(all,'time_feel'), n)}

    <div class="section-title">Time actually taken</div>
    ${barChart(countBy(all,'time_taken'), n)}

    <div class="section-title">Sweetness feedback</div>
    ${barChart(countBy(all,'sweetness'), n)}

    <div class="section-title">Strength feedback</div>
    ${barChart(countBy(all,'strength'), n)}

    <div class="section-title">Body / texture</div>
    ${barChart(countBy(all,'body'), n)}

    <div class="section-title">Compared closest to</div>
    ${barChart(countBy(all,'compare_to'), n)}

    <div class="section-title">Would use again</div>
    ${barChart(countBy(all,'drink_again'), n)}

    <div class="section-title">Realistic frequency of use</div>
    ${barChart(countBy(all,'frequency'), n)}

    <div class="export-row">
      <button class="btn-secondary" onclick="exportJSON()">Export JSON</button>
      <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
    </div>
  `;
}

function renderRawList(all){
  let html = `<div class="section-title">Individual responses (${all.length})</div>`;
  all.slice().reverse().forEach((r,i)=>{
    html += `<div class="resp-item">
      <b>#${all.length-i}</b> — ease: ${r.ease??'?'} · taste: ${r.taste_like??'?'} · ${r.compare_to||'?'}${r.compare_other?` ("${r.compare_other}")`:''} · use again: ${r.drink_again||'?'} (${r.frequency||'?'}) · WTP: ${r.wtp_amount?'₹'+r.wtp_amount:'?'}
      ${r.drink_again_why ? `<br><i>Why not again: "${r.drink_again_why}"</i>` : ''}
      ${r.frequency_why ? `<br><i>Why not more often: "${r.frequency_why}"</i>` : ''}
      ${r.liked_most ? `<br><i>Liked: "${r.liked_most}"</i>` : ''}
      ${r.improve ? `<br><i>Improve: "${r.improve}"</i>` : ''}
    </div>`;
  });
  return html;
}

function exportJSON(){
  const data = JSON.stringify(window._allResponses || [], null, 2);
  downloadFile(data, 'dailydrip_responses.json', 'application/json');
}
function exportCSV(){
  const all = window._allResponses || [];
  if(!all.length) return;
  const keys = Array.from(new Set(all.flatMap(r=>Object.keys(r))));
  const rows = [keys.join(',')].concat(all.map(r => keys.map(k => `"${(r[k]??'').toString().replace(/"/g,'""')}"`).join(',')));
  downloadFile(rows.join('\n'), 'dailydrip_responses.csv', 'text/csv');
}
function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
