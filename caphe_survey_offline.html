<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cà Phê Kit — Field Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --coffee-black:#241611;
    --coffee-dark:#3A241A;
    --cream:#F3E6D4;
    --cream-dim:#D9C7AC;
    --brew-amber:#C17817;
    --brew-amber-bright:#E0952E;
    --brass:#A8804F;
    --line: rgba(243,230,212,0.14);
    --line-bright: rgba(243,230,212,0.28);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at top, #3A241A 0%, #241611 55%, #180E0A 100%);
    color:var(--cream);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Fraunces', serif;}
  .wrap{max-width:560px;margin:0 auto;padding:28px 20px 80px;}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .brand{font-family:'Fraunces',serif;font-size:15px;letter-spacing:0.06em;color:var(--cream-dim);text-transform:uppercase;}
  .brand b{color:var(--brew-amber-bright);}
  .admin-link{font-size:11px;color:rgba(243,230,212,0.35);text-decoration:none;font-family:'IBM Plex Mono',monospace;letter-spacing:0.02em;}
  .admin-link:hover{color:var(--cream-dim);}

  /* ---------- intro ---------- */
  .intro{text-align:center;padding:18px 0 8px;}
  .phin-illustration{width:120px;height:auto;margin:0 auto 22px;display:block;}
  .intro h1{font-size:30px;line-height:1.15;margin:0 0 12px;font-weight:600;color:var(--cream);}
  .intro p{color:var(--cream-dim);font-size:15px;line-height:1.55;margin:0 0 28px;}
  .btn-primary{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--brew-amber);color:#1A0F09;border:none;
    font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:15px;
    padding:14px 30px;border-radius:100px;cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .btn-primary:hover{background:var(--brew-amber-bright);}
  .btn-primary:active{transform:scale(0.98);}
  .btn-secondary{
    background:transparent;border:1px solid var(--line-bright);color:var(--cream);
    font-family:'IBM Plex Sans',sans-serif;font-weight:500;font-size:14px;
    padding:11px 22px;border-radius:100px;cursor:pointer;
  }
  .btn-secondary:hover{border-color:var(--brew-amber);color:var(--brew-amber-bright);}

  /* ---------- brew-stage progress ---------- */
  .stages{display:flex;gap:6px;margin-bottom:30px;}
  .stage{flex:1;height:3px;border-radius:3px;background:var(--line);position:relative;overflow:hidden;}
  .stage.done{background:var(--brew-amber);}
  .stage.active{background:var(--line-bright);}
  .stage.active::after{
    content:'';position:absolute;left:0;top:0;bottom:0;width:40%;
    background:var(--brew-amber-bright);animation:drip 1.4s ease-in-out infinite;
  }
  @keyframes drip{0%{transform:translateX(-100%);}100%{transform:translateX(250%);}}
  .stage-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.04em;color:var(--cream-dim);text-transform:uppercase;margin-bottom:10px;}

  /* ---------- question card ---------- */
  .card{animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .q-label{font-size:19px;font-weight:500;color:var(--cream);margin:0 0 6px;line-height:1.35;font-family:'Fraunces',serif;}
  .q-sub{font-size:13px;color:var(--cream-dim);margin:0 0 20px;}

  .options{display:flex;flex-direction:column;gap:9px;margin-bottom:6px;}
  .opt{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;border-radius:12px;border:1px solid var(--line);
    background:rgba(243,230,212,0.03);cursor:pointer;
    font-size:14.5px;color:var(--cream);transition:.12s ease;
  }
  .opt:hover{border-color:var(--line-bright);background:rgba(243,230,212,0.06);}
  .opt.selected{border-color:var(--brew-amber);background:rgba(193,120,23,0.16);}
  .opt .dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--cream-dim);flex-shrink:0;position:relative;}
  .opt.selected .dot{border-color:var(--brew-amber-bright);}
  .opt.selected .dot::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--brew-amber-bright);}

  .scale-row{display:flex;gap:8px;margin-bottom:8px;}
  .scale-btn{
    flex:1;aspect-ratio:1;border-radius:12px;border:1px solid var(--line);
    background:rgba(243,230,212,0.03);color:var(--cream);font-family:'IBM Plex Mono',monospace;
    font-size:16px;cursor:pointer;transition:.12s ease;display:flex;align-items:center;justify-content:center;
  }
  .scale-btn:hover{border-color:var(--line-bright);}
  .scale-btn.selected{background:var(--brew-amber);border-color:var(--brew-amber);color:#1A0F09;font-weight:600;}
  .scale-caption{display:flex;justify-content:space-between;font-size:11.5px;color:var(--cream-dim);margin-bottom:22px;}

  textarea, input[type=text], input[type=number]{
    width:100%;background:rgba(243,230,212,0.04);border:1px solid var(--line);border-radius:12px;
    color:var(--cream);font-family:'IBM Plex Sans',sans-serif;font-size:14.5px;padding:14px 16px;
    resize:vertical;min-height:88px;
  }
  input[type=text],input[type=number]{min-height:unset;}
  textarea:focus,input:focus{outline:none;border-color:var(--brew-amber);}
  textarea::placeholder,input::placeholder{color:rgba(217,199,172,0.4);}

  .nav-row{display:flex;gap:10px;margin-top:26px;}
  .nav-row .btn-primary{flex:1;justify-content:center;}
  .skip{background:none;border:none;color:var(--cream-dim);font-size:13px;text-decoration:underline;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;display:block;margin:14px auto 0;}

  /* ---------- outro ---------- */
  .outro{text-align:center;padding:40px 0;}
  .outro .check{font-size:40px;margin-bottom:14px;}

  /* ---------- results dashboard ---------- */
  .dash-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px;}
  .dash-title{font-size:22px;font-weight:600;}
  .refresh{background:none;border:1px solid var(--line-bright);color:var(--cream-dim);border-radius:100px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:26px;}
  .stat-box{background:rgba(243,230,212,0.04);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .stat-num{font-family:'Fraunces',serif;font-size:28px;color:var(--brew-amber-bright);font-weight:600;line-height:1;}
  .stat-label{font-size:11.5px;color:var(--cream-dim);margin-top:6px;letter-spacing:0.02em;}
  .bar-row{display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:7px;}
  .bar-label{width:120px;flex-shrink:0;color:var(--cream-dim);font-size:12.5px;}
  .bar-track{flex:1;height:8px;background:rgba(243,230,212,0.08);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--brew-amber);border-radius:6px;}
  .bar-count{width:26px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--cream-dim);}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--brass);margin:28px 0 12px;font-family:'IBM Plex Mono',monospace;}
  .resp-item{background:rgba(243,230,212,0.03);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px;font-size:13px;color:var(--cream-dim);}
  .resp-item b{color:var(--cream);}
  .empty-state{text-align:center;padding:50px 20px;color:var(--cream-dim);font-size:14px;}
  .export-row{display:flex;gap:10px;margin-top:24px;}
  .export-row button{flex:1;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================================================
   QUESTION DATA
   The "correct" fields on recall questions are a best guess at
   the intended process, based on: flip lid, add coffee, add hot
   water, twist to lock, add ice, mix. Edit CORRECT_* below if
   the actual canonical order differs.
   ============================================================ */
const RECALL_ORDER = ["Flip open the lid","Add coffee grounds","Add hot water","Twist the plate to lock","Add ice","Mix / stir"];

const SECTIONS = [
  {
    stage: "Setup",
    questions: [
      { id:"ctx_location", type:"mcq", label:"Where did you try this?", options:["Home","Office","Outdoors / travelling","Somewhere else"] },
      { id:"ctx_ice", type:"mcq", label:"Did you have ice on hand already?", sub:"Before you started, without needing to go get any.", options:["Yes, readily available","Had to go get/make it","No ice available at all"] },
      { id:"ctx_hotwater", type:"mcq", label:"Did you have hot water ready to go?", options:["Yes, kettle/hot water already available","Had to boil water specially for this"] }
    ]
  },
  {
    stage: "Usability",
    questions: [
      { id:"ease", type:"scale", label:"Overall, how easy was it to use?", low:"Very difficult", high:"Very easy" },
      { id:"time", type:"mcq", label:"Roughly how long did the whole process take?", options:["Under 2 minutes","2–4 minutes","4–6 minutes","Over 6 minutes"] },
      { id:"confused", type:"mcq", label:"Did any step feel confusing or unclear?", options:["No, all clear","Yes, one step","Yes, more than one step"] },
      { id:"confused_detail", type:"text", label:"If yes — which step, and what was confusing?", sub:"Skip if nothing felt unclear.", skippable:true }
    ]
  },
  {
    stage: "Recall",
    questions: [
      { id:"recall_first", type:"mcq", label:"Without checking back — what was the FIRST thing you did?", options:shuffle(RECALL_ORDER) },
      { id:"recall_afterwater", type:"mcq", label:"What did you do right after adding hot water?", options:shuffle(["Twisted the plate to lock it down","Added ice immediately","Added the coffee grounds","Mixed it straight away"]) },
      { id:"recall_ice_timing", type:"mcq", label:"When did you add the ice?", options:["Before the hot water","Right after the hot water, before brewing finished","After brewing was done","I didn't add ice"] },
      { id:"recall_done", type:"mcq", label:"How did you know brewing was done?", options:["Guessed based on time","Watched the liquid level","Twisted until it clicked, then waited","Wasn't sure — just stopped at some point"] }
    ]
  },
  {
    stage: "Taste",
    questions: [
      { id:"taste_like", type:"scale", label:"Did you like the coffee?", low:"Not at all", high:"Loved it" },
      { id:"taste_strength", type:"mcq", label:"How was the strength?", options:["Too weak","Just right","Too strong"] },
      { id:"taste_body", type:"mcq", label:"How was the body / texture?", options:["Thin, watery","Balanced","Rich, full-bodied"] },
      { id:"drink_again", type:"mcq", label:"Would you drink this again?", options:["Yes, definitely","Maybe","No"] }
    ]
  },
  {
    stage: "Positioning",
    questions: [
      { id:"compare_to", type:"mcq", label:"What would you compare this closest to?", options:["Instant coffee","RTD cold coffee (bottled/canned)","South Indian filter coffee","Coffee from a café","Something else entirely"] },
      { id:"wtp", type:"mcq", label:"How much would you pay for one single-serve kit?", options:["Under ₹50","₹50–100","₹100–150","₹150–200","Over ₹200"] },
      { id:"frequency", type:"mcq", label:"How often would you realistically use this?", options:["Daily","A few times a week","Occasionally","Probably a one-time try"] }
    ]
  },
  {
    stage: "Feedback",
    questions: [
      { id:"improve", type:"text", label:"Anything that could be improved?", skippable:true },
      { id:"other", type:"text", label:"Any other comments?", skippable:true }
    ]
  }
];

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ============================================================
   STATE
   ============================================================ */
let state = {
  view: location.hash === '#results' ? 'results' : 'intro',
  flatQuestions: SECTIONS.flatMap(s => s.questions.map(q => ({...q, stage:s.stage}))),
  qIndex: 0,
  answers: {},
  results: null,
  resultsLoading: false
};

function render(){
  const app = document.getElementById('app');
  if(state.view === 'intro') app.innerHTML = renderIntro();
  else if(state.view === 'survey') app.innerHTML = renderSurvey();
  else if(state.view === 'outro') app.innerHTML = renderOutro();
  else if(state.view === 'results') { app.innerHTML = renderResultsShell(); }
}

function renderIntro(){
  return `
    <div class="topbar">
      <div class="brand">Cà Phê <b>Kit</b></div>
      <a class="admin-link" href="#results" onclick="state.view='results';render();return false;">compile results →</a>
    </div>
    <div class="intro">
      <svg class="phin-illustration" viewBox="0 0 120 140" fill="none">
        <ellipse cx="60" cy="128" rx="34" ry="7" fill="#A8804F" opacity="0.25"/>
        <path d="M28 30 L36 110 Q60 122 84 110 L92 30" stroke="#D9C7AC" stroke-width="2.5" fill="none"/>
        <ellipse cx="60" cy="30" rx="32" ry="9" stroke="#E0952E" stroke-width="2.5" fill="#C17817" fill-opacity="0.15"/>
        <ellipse cx="60" cy="14" rx="26" ry="7" stroke="#D9C7AC" stroke-width="2" fill="none"/>
        <circle cx="60" cy="14" r="2" fill="#E0952E"/>
        <circle cx="50" cy="12" r="1.6" fill="#E0952E" opacity="0.7"/>
        <circle cx="70" cy="12" r="1.6" fill="#E0952E" opacity="0.7"/>
        <circle cx="55" cy="16" r="1.3" fill="#E0952E" opacity="0.5"/>
        <circle cx="65" cy="16" r="1.3" fill="#E0952E" opacity="0.5"/>
        <path d="M50 122 Q60 128 70 122 L68 138 Q60 142 52 138 Z" fill="#C17817" opacity="0.5"/>
      </svg>
      <h1>How was your brew?</h1>
      <p>You just field-tested the Cà Phê Kit. This takes about 3 minutes — your answers help us get the design and the recipe right before launch.</p>
      <button class="btn-primary" onclick="state.view='survey';render();">Start &nbsp;→</button>
    </div>
  `;
}

function renderSurvey(){
  const q = state.flatQuestions[state.qIndex];
  const total = state.flatQuestions.length;
  const stageStartIndex = state.flatQuestions.findIndex(x=>x.stage===q.stage);
  const stageCount = state.flatQuestions.filter(x=>x.stage===q.stage).length;
  const stagePos = state.qIndex - stageStartIndex + 1;

  let stagesHtml = SECTIONS.map(s=>{
    const sIdx = state.flatQuestions.findIndex(x=>x.stage===s.stage);
    const sEnd = sIdx + s.questions.length - 1;
    let cls = 'stage';
    if(state.qIndex > sEnd) cls += ' done';
    else if(state.qIndex >= sIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let body = '';
  const current = state.answers[q.id];

  if(q.type === 'mcq'){
    body = `<div class="options">` + q.options.map((opt,idx) => `
      <div class="opt ${current===opt?'selected':''}" onclick="selectMcqByIndex('${q.id}', ${idx})">
        <div class="dot"></div><div>${opt}</div>
      </div>`).join('') + `</div>`;
  } else if(q.type === 'scale'){
    body = `<div class="scale-row">` + [1,2,3,4,5].map(n => `
      <div class="scale-btn ${current===n?'selected':''}" onclick="selectMcq('${q.id}', ${n})">${n}</div>`).join('') + `</div>
      <div class="scale-caption"><span>${q.low}</span><span>${q.high}</span></div>`;
  } else if(q.type === 'text'){
    body = `<textarea id="ta_${q.id}" placeholder="Type here..." oninput="state.answers['${q.id}']=this.value">${current||''}</textarea>`;
  }

  const canProceed = q.skippable || (current !== undefined && current !== '');
  const isLast = state.qIndex === total - 1;

  return `
    <div class="topbar">
      <div class="brand">Cà Phê <b>Kit</b></div>
      <div class="admin-link">${state.qIndex+1} / ${total}</div>
    </div>
    <div class="stages">${stagesHtml}</div>
    <div class="stage-label">${q.stage} — step ${stagePos} of ${stageCount}</div>
    <div class="card">
      <div class="q-label">${q.label}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
      ${body}
      <div class="nav-row">
        <button class="btn-primary" ${canProceed?'':'disabled style="opacity:0.35;cursor:not-allowed;"'} onclick="nextQuestion()">${isLast?'Finish':'Next'} &nbsp;→</button>
      </div>
      ${q.skippable ? `<button class="skip" onclick="skipQuestion()">Skip this one</button>` : ''}
    </div>
  `;
}

function selectMcq(id, val){
  state.answers[id] = val;
  render();
}
function selectMcqByIndex(id, idx){
  const q = state.flatQuestions.find(x=>x.id===id);
  state.answers[id] = q.options[idx];
  render();
}
function nextQuestion(){
  const q = state.flatQuestions[state.qIndex];
  const current = state.answers[q.id];
  if(!q.skippable && (current === undefined || current === '')) return;
  if(state.qIndex < state.flatQuestions.length - 1){
    state.qIndex++;
    render();
  } else {
    submitSurvey();
  }
}
function skipQuestion(){
  if(state.qIndex < state.flatQuestions.length - 1){ state.qIndex++; render(); }
  else submitSurvey();
}

function encodeAnswers(answers){
  // UTF-8 safe base64 (handles any special characters typed in free-text answers)
  return btoa(unescape(encodeURIComponent(JSON.stringify(answers))));
}
function decodeAnswers(code){
  return JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
}

function submitSurvey(){
  state.resultCode = encodeAnswers(state.answers);
  state.view = 'outro';
  render();
}

function renderOutro(){
  return `
    <div class="topbar"><div class="brand">Cà Phê <b>Kit</b></div><div></div></div>
    <div class="outro">
      <div class="check">☕</div>
      <h2>Thanks — that's brewed in.</h2>
      <p style="color:var(--cream-dim);font-size:14.5px;margin-bottom:22px;">One last step: send this code back however's easiest — WhatsApp, email, whatever.</p>
      <textarea id="resultCodeBox" readonly style="min-height:90px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.5;color:var(--cream-dim);text-align:left;">${state.resultCode}</textarea>
      <div class="export-row" style="margin-top:14px;">
        <button class="btn-primary" style="flex:1;justify-content:center;" onclick="copyCode()">Copy code</button>
        <button class="btn-secondary" onclick="downloadCode()">Download file</button>
      </div>
      <div id="copyConfirm" style="font-size:12.5px;color:var(--brew-amber-bright);margin-top:10px;height:16px;"></div>
    </div>
  `;
}
function copyCode(){
  const box = document.getElementById('resultCodeBox');
  box.removeAttribute('readonly'); // some mobile WebViews block selecting readonly fields
  box.focus();
  box.select();
  box.setSelectionRange(0, state.resultCode.length); // iOS Safari needs this explicitly

  function showConfirm(msg){ document.getElementById('copyConfirm').textContent = msg; }

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(state.resultCode).then(()=>{
      showConfirm('Copied — go ahead and paste it into your message.');
    }).catch(()=>{ tryFallbackCopy(box, showConfirm); });
  } else {
    tryFallbackCopy(box, showConfirm);
  }
}
function tryFallbackCopy(box, showConfirm){
  try{
    const ok = document.execCommand('copy');
    showConfirm(ok ? 'Copied — go ahead and paste it into your message.'
                   : 'Auto-copy not available here — the text above is already selected, use your device copy action, or tap Download instead.');
  }catch(e){
    showConfirm('Auto-copy not available here — the text above is already selected, use your device copy action, or tap Download instead.');
  }
}
function downloadCode(){
  downloadFile(state.resultCode, `caphe_response_${Date.now()}.txt`, 'text/plain');
}

/* ============================================================
   RESULTS DASHBOARD
   ============================================================ */
function renderResultsShell(){
  return `
    <div class="topbar">
      <div class="brand">Cà Phê <b>Kit</b> — Compile</div>
      <a class="admin-link" href="#" onclick="state.view='intro';render();return false;">← back</a>
    </div>
    <p style="color:var(--cream-dim);font-size:13.5px;margin-bottom:14px;">Paste in every code you've received back — one per line (or with blank lines between, either's fine).</p>
    <textarea id="pasteBox" placeholder="Paste codes here, one per line..." style="min-height:140px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;"></textarea>
    <button class="btn-primary" style="margin-top:14px;width:100%;justify-content:center;" onclick="compileResults()">Compile results</button>
    <div id="results-body" style="margin-top:24px;"></div>
  `;
}
function compileResults(){
  const raw = document.getElementById('pasteBox').value;
  const lines = raw.split('\\n').map(l=>l.trim()).filter(l=>l.length>10);
  const all = [];
  let failed = 0;
  lines.forEach(line => {
    try{ all.push(decodeAnswers(line)); } catch(e){ failed++; }
  });
  const body = document.getElementById('results-body');
  if(all.length === 0){
    body.innerHTML = `<div class="empty-state">Couldn't read any valid codes. Check they were pasted in full, with nothing cut off.</div>`;
    return;
  }
  let warn = failed > 0 ? `<div style="color:var(--brew-amber-bright);font-size:12.5px;margin-bottom:16px;">${failed} line(s) couldn't be read and were skipped.</div>` : '';
  body.innerHTML = warn + renderStats(all) + renderRawList(all);
  window._allResponses = all;
}

function avg(arr){ const nums = arr.filter(x=>typeof x==='number'); if(!nums.length) return null; return (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1); }
function countBy(arr, key){
  const counts = {};
  arr.forEach(r => { const v = r[key]; if(v!==undefined && v!=='') counts[v] = (counts[v]||0)+1; });
  return counts;
}
function barChart(counts, total){
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  return entries.map(([label,count])=>`
    <div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(count/total*100).toFixed(0)}%"></div></div>
      <div class="bar-count">${count}</div>
    </div>`).join('');
}

function renderStats(all){
  const n = all.length;
  const easeAvg = avg(all.map(r=>r.ease));
  const tasteAvg = avg(all.map(r=>r.taste_like));
  const wouldAgain = all.filter(r=>r.drink_again==='Yes, definitely').length;

  let html = `
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${n}</div><div class="stat-label">Total responses</div></div>
      <div class="stat-box"><div class="stat-num">${easeAvg ?? '—'}</div><div class="stat-label">Avg ease of use (/5)</div></div>
      <div class="stat-box"><div class="stat-num">${tasteAvg ?? '—'}</div><div class="stat-label">Avg taste rating (/5)</div></div>
      <div class="stat-box"><div class="stat-num">${n?Math.round(wouldAgain/n*100):0}%</div><div class="stat-label">Would drink again</div></div>
    </div>

    <div class="section-title">Willingness to pay</div>
    ${barChart(countBy(all,'wtp'), n)}

    <div class="section-title">Compared closest to</div>
    ${barChart(countBy(all,'compare_to'), n)}

    <div class="section-title">Strength feedback</div>
    ${barChart(countBy(all,'taste_strength'), n)}

    <div class="section-title">Process recall — first step</div>
    ${barChart(countBy(all,'recall_first'), n)}

    <div class="section-title">Ice availability</div>
    ${barChart(countBy(all,'ctx_ice'), n)}

    <div class="export-row">
      <button class="btn-secondary" onclick="exportJSON()">Export JSON</button>
      <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
    </div>
  `;
  return html;
}

function renderRawList(all){
  let html = `<div class="section-title">Individual responses (${all.length})</div>`;
  all.slice().reverse().forEach((r,i)=>{
    html += `<div class="resp-item">
      <b>#${all.length-i}</b> — ${r.ctx_location||'?'} · ease ${r.ease??'?'}/5 · taste ${r.taste_like??'?'}/5 · WTP ${r.wtp||'?'} · ${r.compare_to||'?'}
      ${r.improve ? `<br><i>"${r.improve}"</i>` : ''}
      ${r.other ? `<br><i>"${r.other}"</i>` : ''}
    </div>`;
  });
  return html;
}

function exportJSON(){
  const data = JSON.stringify(window._allResponses || [], null, 2);
  downloadFile(data, 'caphe_survey_responses.json', 'application/json');
}
function exportCSV(){
  const all = window._allResponses || [];
  if(!all.length) return;
  const keys = Array.from(new Set(all.flatMap(r=>Object.keys(r))));
  const rows = [keys.join(',')].concat(all.map(r => keys.map(k => `"${(r[k]??'').toString().replace(/"/g,'""')}"`).join(',')));
  downloadFile(rows.join('\n'), 'caphe_survey_responses.csv', 'text/csv');
}
function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
